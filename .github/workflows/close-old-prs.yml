name: Close Old Pull Requests

on:
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  close-old-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Close PRs older than one week
        uses: actions/github-script@v7
        with:
          script: |
            const DAYS_THRESHOLD = 7;
            const MS_PER_DAY = 24 * 60 * 60 * 1000;
            // Safety limit: process up to 5,000 PRs (50 pages × 100 items/page) per run.
            const MAX_PAGES = 50;
            const cutoffDate = new Date(Date.now() - (DAYS_THRESHOLD * MS_PER_DAY));
            let page = 1;
            let closedCount = 0;
            let shouldStop = false;

            while (!shouldStop && page <= MAX_PAGES) {
              const { data: pullRequests } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                sort: 'created',
                direction: 'asc',
                per_page: 100,
                page,
              });

              if (pullRequests.length === 0) {
                break;
              }

              for (const pullRequest of pullRequests) {
                const createdAt = new Date(pullRequest.created_at);
                if (createdAt > cutoffDate) {
                  shouldStop = true;
                  break;
                }

                const daysOpen = Math.floor((Date.now() - createdAt.getTime()) / MS_PER_DAY);
                const createdOn = createdAt.toISOString();

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pullRequest.number,
                  body: `Closing this pull request because it has been open for ${daysOpen} days (created at ${createdOn}). Please open a new PR if this is still needed.`,
                });

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pullRequest.number,
                  state: 'closed',
                });

                core.info(`Closed PR #${pullRequest.number} created at ${pullRequest.created_at}`);
                closedCount += 1;
              }

              page += 1;
            }

            core.info(`Total closed PRs: ${closedCount}`);
